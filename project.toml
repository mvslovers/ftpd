[project]
name = "ftpd"
version = "1.0.0-dev"
type = "application"

[build]
cflags = [
	"-std=gnu99"
]

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 30, 10, 30]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 10, 5, 5]

[dependencies]
"mvslovers/crent370" = ">=1.0.5"

[[link.module]]
name = "FTPD"
entry = "@@CRT0"
options = ["SIZE=(4000K,40K)", "LIST", "MAP", "XREF", "RENT"]
include = ["@@CRT1", "FTPD"]
setcode = "AC(1)"

[release]
version_files = ["VERSION"]

[artifacts]
loads = true
